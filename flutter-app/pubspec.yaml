name: flutter_rooms_manager
description: A new Flutter project for testing Rooms Manager communication platform.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0
  socket_io_client: ^2.0.0

  # WebRTC
  flutter_webrtc: ^0.9.47
  sdp_transform: ^0.3.0

  # State Management
  provider: ^6.0.0
  get: ^4.6.5

  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.0.0
  intl: ^0.19.0
  logger: ^2.0.0
  shared_preferences: ^2.2.0
  permission_handler: ^11.4.4
  device_info_plus: ^9.1.0
  connectivity_plus: ^5.0.0

  # Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_linter: ^2.0.0
  mockito: ^5.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
