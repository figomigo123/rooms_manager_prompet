version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: rooms_manager_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: auth_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - rooms_manager_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rooms_manager_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rooms_manager_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    ports:
      - "8001:8001"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://root:password123@mongodb:27017/auth_db?authSource=admin
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-in-production-min-32-chars-long
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rooms_manager_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/auth/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  room-service:
    build:
      context: ./room-service
      dockerfile: Dockerfile
    container_name: room_service
    ports:
      - "8002:8002"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://root:password123@mongodb:27017/rooms_db?authSource=admin
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-in-production-min-32-chars-long
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - rooms_manager_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/room/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mediasoup-service:
    build:
      context: ./mediasoup-service
      dockerfile: Dockerfile
    container_name: mediasoup_service
    ports:
      - "8003:3000" # signaling / REST API / websocket
      - "40000-40020:40000-40020/udp" # RTP/RTCP UDP ports for mediasoup workers
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8001
      ROOM_SERVICE_URL: http://room-service:8002
      MEDIAWORKERS: '4'
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      room-service:
        condition: service_started
    networks:
      - rooms_manager_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: chat_service
    ports:
      - "8004:8004"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8001
      ROOM_SERVICE_URL: http://room-service:8002
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      room-service:
        condition: service_started
    networks:
      - rooms_manager_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/chat/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  usage-service:
    build:
      context: ./usage-service
      dockerfile: Dockerfile
    container_name: usage_service
    ports:
      - "8005:8005"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://root:password123@mongodb:27017/usage_db?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - rooms_manager_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/usage/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: instrumentisto/coturn:4.5
    container_name: coturn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478"
      - "5349:5349/tcp"
    environment:
      TURN_DOMAIN: "example.com"
      TURN_SECRET: "turn-secret-replace-this"
    command: ["-n", "-l", "stdout", "--no-stdout-log", "--nodaemon", "--listening-port=3478", "--min-port=49152", "--max-port=65535"]
    networks:
      - rooms_manager_network

  minio:
    image: minio/minio:RELEASE.2023-08-03T00-00-00Z
    container_name: minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    volumes:
      - minio_data:/data
    networks:
      - rooms_manager_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: admin_frontend
    ports:
      - "8080:80"
    environment:
      REACT_APP_AUTH_URL: http://auth-service:8001
      REACT_APP_ROOM_URL: http://room-service:8002
      REACT_APP_MEDIASOUP_URL: http://mediasoup-service:3000
    depends_on:
      auth-service:
        condition: service_started
      room-service:
        condition: service_started
    networks:
      - rooms_manager_network

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:
  minio_data:
  mediasoup_data:

networks:
  rooms_manager_network:
    driver: bridge
