spring:
  application:
    name: room-service
  data:
    mongodb:
      uri: mongodb://root:password123@mongodb:27017/room_db?authSource=admin
    redis:
      host: redis
      port: 6379
  jackson:
    default-property-inclusion: non_null

server:
  port: 8002

jwt:
  secret: your-secret-key-change-in-production-min-32-chars-long
  expiration: 900000

auth-service:
  url: http://auth-service:8001
  verify-token-endpoint: /auth/v1/verify-token

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: Content-Type,Authorization
    allow-credentials: true

logging:
  level:
    root: INFO
    com.roomsmanager: DEBUG